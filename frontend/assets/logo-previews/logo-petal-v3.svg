<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Petal Bloom V3: stylized lotus glyph (no letters) — represents inner aura unfolding -->
  <defs>
    <radialGradient id="qA" cx="50%" cy="0%" r="80%"><stop offset="0%" stop-color="#FACC15"/><stop offset="100%" stop-color="#FACC15" stop-opacity="0"/></radialGradient>
    <radialGradient id="qB" cx="50%" cy="0%" r="80%"><stop offset="0%" stop-color="#EC4899"/><stop offset="100%" stop-color="#EC4899" stop-opacity="0"/></radialGradient>
    <radialGradient id="qC" cx="50%" cy="0%" r="80%"><stop offset="0%" stop-color="#FF7A00"/><stop offset="100%" stop-color="#FF7A00" stop-opacity="0"/></radialGradient>
    <radialGradient id="qD" cx="50%" cy="0%" r="80%"><stop offset="0%" stop-color="#22D3EE"/><stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/></radialGradient>
    <radialGradient id="qE" cx="50%" cy="0%" r="80%"><stop offset="0%" stop-color="#A855F7"/><stop offset="100%" stop-color="#A855F7" stop-opacity="0"/></radialGradient>
    <radialGradient id="qF" cx="50%" cy="0%" r="80%"><stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#10B981" stop-opacity="0"/></radialGradient>
    <radialGradient id="qG" cx="50%" cy="0%" r="80%"><stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/></radialGradient>
    <radialGradient id="qH" cx="50%" cy="0%" r="80%"><stop offset="0%" stop-color="#FB923C"/><stop offset="100%" stop-color="#FB923C" stop-opacity="0"/></radialGradient>

    <linearGradient id="lotusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#1a1a1f"/>
    </linearGradient>
    <radialGradient id="dropGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FACC15"/>
      <stop offset="40%" stop-color="#EC4899"/>
      <stop offset="80%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </radialGradient>

    <filter id="petBlur"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="512" height="512" fill="#050505" rx="96" ry="96"/>

  <!-- 8 outer petals (background bloom) -->
  <g transform="translate(256 256)" filter="url(#petBlur)" style="mix-blend-mode: screen">
    <ellipse cx="0" cy="-95" rx="80" ry="150" fill="url(#qA)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-95" rx="80" ry="150" fill="url(#qB)" transform="rotate(45)"/>
    <ellipse cx="0" cy="-95" rx="80" ry="150" fill="url(#qC)" transform="rotate(90)"/>
    <ellipse cx="0" cy="-95" rx="80" ry="150" fill="url(#qD)" transform="rotate(135)"/>
    <ellipse cx="0" cy="-95" rx="80" ry="150" fill="url(#qE)" transform="rotate(180)"/>
    <ellipse cx="0" cy="-95" rx="80" ry="150" fill="url(#qF)" transform="rotate(225)"/>
    <ellipse cx="0" cy="-95" rx="80" ry="150" fill="url(#qG)" transform="rotate(270)"/>
    <ellipse cx="0" cy="-95" rx="80" ry="150" fill="url(#qH)" transform="rotate(315)"/>
  </g>

  <!-- White circle background -->
  <circle cx="256" cy="256" r="92" fill="#ffffff" opacity="0.97"/>

  <!-- Stylized lotus / aura glyph centered -->
  <g transform="translate(256 256)">
    <!-- 3 lotus inner petals layered, dark fill -->
    <!-- center vertical petal (drop-like) -->
    <path d="M 0 -52
             C -22 -52, -34 -28, -34 -8
             C -34 14, -18 32, 0 36
             C 18 32, 34 14, 34 -8
             C 34 -28, 22 -52, 0 -52 Z"
          fill="url(#lotusGrad)"/>

    <!-- left side petal -->
    <path d="M -38 -10
             C -52 -10, -60 4, -56 22
             C -50 38, -32 44, -16 38
             C -8 28, -16 12, -22 4
             C -28 -4, -34 -8, -38 -10 Z"
          fill="url(#lotusGrad)" opacity="0.88"/>

    <!-- right side petal (mirror) -->
    <path d="M 38 -10
             C 52 -10, 60 4, 56 22
             C 50 38, 32 44, 16 38
             C 8 28, 16 12, 22 4
             C 28 -4, 34 -8, 38 -10 Z"
          fill="url(#lotusGrad)" opacity="0.88"/>

    <!-- Tiny rainbow aura "drop" at the heart of the lotus -->
    <circle cx="0" cy="-12" r="11" fill="url(#dropGrad)"/>
    <circle cx="0" cy="-12" r="11" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="0.8"/>

    <!-- subtle gold sparkle dots around -->
    <circle cx="-50" cy="-40" r="2" fill="#FACC15" opacity="0.85"/>
    <circle cx="48" cy="-44" r="1.5" fill="#EC4899" opacity="0.85"/>
    <circle cx="0" cy="-68" r="1.8" fill="#A855F7" opacity="0.9"/>
    <circle cx="-58" cy="22" r="1.5" fill="#22D3EE" opacity="0.85"/>
    <circle cx="56" cy="20" r="1.5" fill="#10B981" opacity="0.85"/>
  </g>
</svg>
