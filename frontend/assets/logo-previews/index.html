<!doctype html>
<html><head><meta charset="utf-8"/>
<title>InnFeel — V4</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #050505; font-family: -apple-system, system-ui; color: #fff; padding: 60px 20px; text-align: center; }
  h1 { font-weight: 900; margin: 0 0 8px; font-size: 34px; }
  h1 span { background: linear-gradient(90deg, #FACC15, #EC4899, #22D3EE, #A855F7); -webkit-background-clip: text; background-clip: text; color: transparent; }
  p.sub { color: #888; margin: 0 0 48px; font-size: 14px; }
  .row { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }
  .card { background: #0a0a0c; border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 24px; width: 320px; }
  img { width: 260px; height: 260px; display: block; margin: 0 auto; border-radius: 32px; }
  .small-row { display: flex; gap: 12px; justify-content: center; margin-top: 16px; align-items: center; }
  .small-row img { width: 48px; height: 48px; border-radius: 12px; }
  .note { color: #bbb; font-size: 12px; margin-top: 14px; line-height: 1.5; }
  h3 { margin: 16px 0 4px; font-size: 18px; }
  .tag { color: #888; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
</style></head>
<body>
<h1><span>InnFeel</span></h1>
<p class="sub">Petal Bloom · cursive monogram ✨</p>
<div class="row">
  <div class="card">
    <div class="tag">Final concept</div>
    <h3>Aura Script</h3>
    <img src="logo-petal-v4.svg"/>
    <div class="small-row">
      <img src="logo-petal-v4.svg"/>
      <img src="logo-petal-v4.svg" style="width:32px;height:32px;border-radius:8px"/>
    </div>
    <p class="note">"Inn" et "Feel" empilés en cursive Dancing Script, séparés par une fine arabesque ornementale. Lisible, raffiné, fait main.</p>
  </div>
</div>
</body></html>
